name: CI

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        run: pnpm install --no-frozen-lockfile
      - name: Build all apps (with GH Pages base path so prod build path is exercised)
        env:
          GH_PAGES: '1'
        run: pnpm -r build
